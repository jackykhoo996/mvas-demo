<!DOCTYPE html>
<html>
<head>
  <title>MVAS PIN FLOW</title>
</head>

<body>

  <h1>Watch Premium Videos</h1>

  <!-- phone input -->
  <input
    id="msisdn"
    placeholder="Enter Phone Number"
  >

  <button onclick="sendPIN()">
    Continue
  </button>

  <!-- otp box -->
  <div
    id="otpBox"
    style="display:none; margin-top:20px;"
  >

    <input
      id="otp"
      placeholder="Enter OTP"
    >

    <button onclick="verifyOTP()">
      Verify OTP
    </button>

  </div>

<script>

let currentTxid = null;

// SEND PIN
async function sendPIN(){

  const msisdn =
    document.getElementById('msisdn').value;

  const response = await fetch('/api/send-pin',{

    method:'POST',

    headers:{
      'Content-Type':'application/json'
    },

    body:JSON.stringify({
      msisdn:msisdn
    })

  });

  const data = await response.json();

  console.log(data);

  // save txid
  currentTxid = data.txid;

  // show otp box
  document
    .getElementById('otpBox')
    .style.display = 'block';

}


// VERIFY OTP
async function verifyOTP(){

  const otp =
    document.getElementById('otp').value;

  const response = await fetch('/api/verify-pin',{

    method:'POST',

    headers:{
      'Content-Type':'application/json'
    },

    body:JSON.stringify({

      txid:currentTxid,

      pin:otp

    })

  });

  const data = await response.json();

  console.log(data);

  if(data.success){

    alert("Subscription Success");

  } else {

    alert("Wrong OTP");

  }

}

</script>

</body>
</html>
